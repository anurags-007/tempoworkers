<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Premium SEO Metadata -->
    <title>TempoWorkers - On-Demand Blue Collar Jobs & Instant Worker Matching Platform</title>
    <meta name="description" content="TempoWorkers connects local skilled blue-collar workers (masons, plumbers, electricians, painters, and more) with employers in India. Features instant direct chat, verified ratings, and secure escrow payments." />
    <meta name="keywords" content="blue collar jobs, local workers, helper, painter, mason, plumber, driver, hiring workers, job portal india, tempoworkers, escrow payment, daily wage jobs" />
    <meta name="author" content="TempoWorkers" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://tempoworkers.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tempoworkers.com/" />
    <meta property="og:title" content="TempoWorkers - On-Demand Blue Collar Jobs & Instant Worker Matching" />
    <meta property="og:description" content="Hire local skilled workers instantly or find daily wage work nearby. Safe payment escrows, direct chat, and verified ratings." />
    <meta property="og:image" content="https://tempoworkers.com/icons/icon-512x512.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://tempoworkers.com/" />
    <meta property="twitter:title" content="TempoWorkers - On-Demand Blue Collar Jobs & Instant Worker Matching" />
    <meta property="twitter:description" content="Hire local skilled workers instantly or find daily wage work nearby. Safe payment escrows, direct chat, and verified ratings." />
    <meta property="twitter:image" content="https://tempoworkers.com/icons/icon-512x512.png" />

    <!-- Theme & App Colors -->
    <meta name="theme-color" content="#059669" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Schema.org JSON-LD Structured Data for Search Engine Optimization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TempoWorkers",
      "url": "https://tempoworkers.com",
      "description": "On-Demand Blue Collar Jobs & Instant Worker Matching Platform in India",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://tempoworkers.com/#/jobs?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "TempoWorkers",
      "url": "https://tempoworkers.com",
      "logo": "https://tempoworkers.com/icons/icon-512x512.png",
      "sameAs": [
        "https://twitter.com/tempoworkers",
        "https://github.com/anurags-007/tempoworkers"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
